services:
  app:
    build: .
    container_name: ops-min-app
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: file:/app/data/dev.db
      BASIC_AUTH_USER: gyg_user
      BASIC_AUTH_PASS: gyg_pass
      ADMIN_TOKEN: admin_dev_token
      DEFAULT_SUPPLIER_ID: supplier123
    ports:
      - '3000:3000'
    volumes:
      - ./data:/app/data
